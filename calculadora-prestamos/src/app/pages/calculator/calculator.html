<main class="calculator-page">
  <section class="hero-section">
    <div class="hero-content">
      <span class="badge rounded-pill text-bg-light hero-badge">
        <i class="bi bi-bank"></i>
        Simulador Financiero RD
      </span>

      <div class="brand-logo">
        <img src="/assets/img/logo-loancalc-rd.png" alt="LoanCalc RD" />
      </div>
      <p>
        Calcula cuotas, intereses y amortización de préstamos con una experiencia moderna, rápida y
        clara.
      </p>
    </div>
  </section>

  <section class="calculator-wrapper">
    <div class="container">
      <div class="loan-card">
        <div class="loan-card-header">
          <div>
            <span class="section-kicker">Nueva simulación</span>
            <h2>Calculadora de Préstamos</h2>
          </div>

          <div class="card-icon">
            <i class="bi bi-calculator"></i>
          </div>
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <form>
          <div class="form-section">
            <div class="form-section-title">
              <i class="bi bi-person-vcard"></i>
              <h3>Datos personales</h3>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">Nombre(s)</label>
                <input
                  id="firstName"
                  name="firstName"
                  type="text"
                  class="form-control"
                  placeholder="Ej: Jairo"
                  [(ngModel)]="request.firstName"
                />
              </div>

              <div class="col-md-6">
                <label for="lastName" class="form-label">Apellido(s)</label>
                <input
                  id="lastName"
                  name="lastName"
                  type="text"
                  class="form-control"
                  placeholder="Ej: Matías"
                  [(ngModel)]="request.lastName"
                />
              </div>

              <div class="col-md-6">
                <label for="birthDate" class="form-label">Fecha de nacimiento</label>
                <input
                  id="birthDate"
                  name="birthDate"
                  type="date"
                  class="form-control"
                  [(ngModel)]="request.birthDate"
                />
              </div>

              <div class="col-md-6">
                <label for="documentId" class="form-label">Cédula</label>
                <input
                  id="documentId"
                  name="documentId"
                  type="text"
                  class="form-control"
                  placeholder="000-0000000-0"
                  maxlength="11"
                  [(ngModel)]="request.documentId"
                />
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">
              <i class="bi bi-cash-coin"></i>
              <h3>Datos del préstamo</h3>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="loanType" class="form-label">Tipo de préstamo</label>
                <select
                  id="loanType"
                  name="loanType"
                  class="form-select"
                  [(ngModel)]="request.loanType"
                >
                  <option value="">Selecciona una opción</option>
                  @for (type of loanTypes; track type) {
                    <option [value]="type">{{ type }}</option>
                  }
                </select>
              </div>

              <div class="col-md-6">
                <label for="amount" class="form-label">Monto solicitado</label>
                <div class="input-group">
                  <span class="input-group-text">RD$</span>
                  <input
                    id="amount"
                    name="amount"
                    type="number"
                    min="1"
                    class="form-control"
                    placeholder="250000"
                    [(ngModel)]="request.amount"
                  />
                </div>
              </div>

              <div class="col-md-6">
                <label for="annualRate" class="form-label">Tasa anual</label>
                <div class="input-group">
                  <input
                    id="annualRate"
                    name="annualRate"
                    type="number"
                    min="1"
                    step="0.01"
                    class="form-control"
                    placeholder="18"
                    [(ngModel)]="request.annualRate"
                  />
                  <span class="input-group-text">%</span>
                </div>
              </div>

              <div class="col-md-6">
                <label for="termMonths" class="form-label">Duración</label>
                <div class="input-group">
                  <input
                    id="termMonths"
                    name="termMonths"
                    type="number"
                    min="1"
                    class="form-control"
                    placeholder="36"
                    [(ngModel)]="request.termMonths"
                  />
                  <span class="input-group-text">meses</span>
                </div>
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="button" class="btn btn-primary btn-lg" (click)="calculate()">
              <i class="bi bi-graph-up-arrow"></i>
              Calcular préstamo
            </button>

            <button type="button" class="btn btn-outline-secondary btn-lg" (click)="clear()">
              <i class="bi bi-arrow-counterclockwise"></i>
              Limpiar
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>
</main>
