name: LoanCalc RD CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: calculadora-prestamos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: calculadora-prestamos/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular project
        run: npm run build